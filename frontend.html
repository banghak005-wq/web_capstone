<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        /* 상단 유저 ID 바 */
        #topNavBar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: white; display: none; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        .user-id-display { font-weight: bold; color: var(--primary); margin-right: 15px; }
        .logout-btn { background: #f1f3f4; border: 1px solid #dadce0; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        #status { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; font-size: 14px; display: none; }
        #resultImage { width: 100%; margin-top: 20px; border-radius: 12px; display: none; border: 1px solid #eee; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div id="topNavBar">
        <span class="user-id-display" id="loggedInUser"></span>
        <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>

    <div class="container">
        <div id="loginSection" class="card">
            <h2 style="margin-bottom: 30px;">AI Image Generator</h2>
            <input type="text" id="loginId" placeholder="아이디">
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="main-btn" onclick="normalLogin()">로그인</button>
            <div style="margin: 20px 0; color: #aaa; font-size: 14px;">또는</div>
            <div id="g_id_onload" 
                 data-client_id="281972226742-0n2csh9se175549hnhp8ql0b5docfkr0.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin" 
                 data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <div id="drawSection" class="card" style="display: none;">
            <h3 style="margin-top: 0;">원하는 이미지를 설명하세요</h3>
            <input type="text" id="promptInput" placeholder="프롬프트 입력..." onkeypress="if(event.keyCode==13) startDraw()">
            <button class="main-btn" onclick="startDraw()">그리기 시작</button>
            <div id="status">상태 메시지</div>
            <img id="resultImage" alt="AI Generated Image">
            <button id="downBtn" class="main-btn" style="background: #34a853; display: none;" onclick="downloadImage()">이미지 저장</button>
        </div>
    </div>

    <script>
        const API_HOST = "https://testminsu.uk";
        let checkTimer = null;

        // 공통 fetch 래퍼 - credentials: 'include' 항상 포함
        async function apiFetch(endpoint, body) {
            return fetch(`${API_HOST}${endpoint}`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function initAfterLogin(userId) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('drawSection').style.display = 'block';
            document.getElementById('topNavBar').style.display = 'flex';
            document.getElementById('loggedInUser').textContent = "👤 " + userId;
        }

        // 페이지 로드 시 자동 로그인 세션 확인 (/me 호출)
        window.onload = async function() {
            const token = getCookie('session_token');
            if (token) {
                try {
                    const res = await apiFetch('/me', { session_token: token });
                    const data = await res.json();
                    if (data.success) initAfterLogin(data.data.user_id);
                } catch (e) { console.error("세션 확인 에러", e); }
            }
        };

        async function normalLogin() {
            const id = document.getElementById('loginId').value;
            const pw = document.getElementById('loginPw').value;
            const res = await apiFetch('/login', { id, pw });
            const data = await res.json();
            if (data.success) initAfterLogin(data.data.user_id);
            else alert("로그인 실패");
        }

        async function handleGoogleLogin(response) {
            const res = await apiFetch('/login_g', { id: response.credential });
            const data = await res.json();
            if (data.success) {
                // [수정] JS로 쿠키 직접 쓰지 않음.
                // 서버가 Set-Cookie 헤더로 발급한 쿠키를 그대로 사용.
                // (기존 코드의 document.cookie = ... 가 SameSite=Lax로 덮어써서
                //  서버 쿠키를 망가뜨리던 버그 제거)
                initAfterLogin(data.data.user_id);
            } else {
                alert("구글 로그인 실패");
            }
        }

        async function startDraw() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) return alert("프롬프트를 입력하세요.");

            const token = getCookie('session_token');
            const res = await apiFetch('/join_awaiting', { session_token: token, prompt: promptText });
            const data = await res.json();
            console.log("join_awaiting 응답:", JSON.stringify(data));
            if (data.success) {
                updateStatus(`대기열 등록 완료 (순번: ${data.data.queue_position})`);
                if (checkTimer) clearInterval(checkTimer);
                checkTimer = setInterval(pollStatus, 3000);
            } else {
                alert("오류: " + data.error);
            }
        }

        async function pollStatus() {
            const token = getCookie('session_token');
            const res = await apiFetch('/check_awaiting', { session_token: token });
            const data = await res.json();
            if (data.success) {
                const s = data.data.status;
                if (s === 'done') { clearInterval(checkTimer); showResult(); }
                else updateStatus(s === 'processing' ? '그림 그리는 중...' : `대기 중 (${data.data.queue_position})`);
            }
        }

        async function showResult() {
            const token = getCookie('session_token');
            const res = await apiFetch('/get_result', { session_token: token });
            const data = await res.json();
            if (data.success) {
                const img = document.getElementById('resultImage');
                img.src = `data:image/webp;base64,${data.data.image}`;
                img.style.display = 'block';
                document.getElementById('downBtn').style.display = 'block';
                updateStatus("완료!");
                apiFetch('/result_ack', { session_token: token });
            }
        }

        function updateStatus(msg) { const s = document.getElementById('status'); s.style.display = 'block'; s.textContent = msg; }
        function logout() { apiFetch('/logout', { session_token: getCookie('session_token') }).then(() => location.reload()); }
        function downloadImage() { const a = document.createElement('a'); a.href = document.getElementById('resultImage').src; a.download = 'ai-image.webp'; a.click(); }
    </script>
</body>
</html>
